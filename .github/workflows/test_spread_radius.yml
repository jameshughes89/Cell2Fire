name: test_spread_radius

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: test_spread_radius
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libboost-all-dev libeigen3-dev

      - name: make C++
        run: |
          cd cell2fire/Cell2FireC
          make

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest -e .


      - name: run tests
        run: |
          cd tests
          pytest test_spread_radius.py
